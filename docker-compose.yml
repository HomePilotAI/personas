# Top-level compose entrypoint.
#
# The canonical service definitions live in docker-compose.mcp.yml. That
# file is kept separately because the persona pack is consumed both as a
# standalone repo (`docker compose up`) and as a layer that callers
# `docker compose -f docker-compose.mcp.yml up` from their own stack.
#
# Compose v2 `include:` brings the canonical file in unchanged. Older
# tooling that does not support `include:` should run the canonical file
# directly:
#
#     docker compose -f docker-compose.mcp.yml up
#
# Do NOT add service overrides here that contradict docker-compose.mcp.yml
# — keep this file as a thin alias.
include:
  - docker-compose.mcp.yml
